<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛车游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        .game-container {
            text-align: center;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        canvas {
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #333;
        }
        
        .controls {
            margin-top: 20px;
            color: #fff;
            font-size: 1.2em;
        }
        
        .score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .score-board h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .score-board p {
            color: #666;
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .instructions {
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            color: #333;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        
        .game-over h2 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #ff4444;
        }
        
        .game-over button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .game-over button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🏎️ 赛车游戏</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div class="controls">
            <p>使用 ← → 方向键控制赛车</p>
        </div>
        
        <div class="score-board">
            <h2>得分</h2>
            <p id="score">0</p>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">重新开始</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameRunning = true;
        let score = 0;
        let speed = 5;
        
        // 玩家赛车
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 100,
            width: 50,
            height: 80,
            speed: 7,
            color: '#ff0000'
        };
        
        // 敌方赛车
        let enemies = [];
        const enemySpeed = 3;
        
        // 道路标线
        let roadLines = [];
        for (let i = 0; i < 10; i++) {
            roadLines.push({
                x: canvas.width / 2 - 5,
                y: i * 80,
                width: 10,
                height: 40
            });
        }
        
        // 控制按键
        const keys = {
            left: false,
            right: false
        };
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });
        
        // 生成敌方赛车
        function spawnEnemy() {
            const lanes = [50, 150, 250, 300];
            const randomLane = lanes[Math.floor(Math.random() * lanes.length)];
            
            enemies.push({
                x: randomLane,
                y: -80,
                width: 50,
                height: 80,
                color: `hsl(${Math.random() * 360}, 70%, 50%)`
            });
        }
        
        // 绘制赛车
        function drawCar(x, y, width, height, color) {
            // 车身
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
            
            // 车窗
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(x + 10, y + 10, width - 20, 20);
            ctx.fillRect(x + 10, y + height - 30, width - 20, 20);
            
            // 车轮
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 5, y + 10, 10, 20);
            ctx.fillRect(x + width - 5, y + 10, 10, 20);
            ctx.fillRect(x - 5, y + height - 30, 10, 20);
            ctx.fillRect(x + width - 5, y + height - 30, 10, 20);
        }
        
        // 绘制道路
        function drawRoad() {
            // 道路背景
            ctx.fillStyle = '#555';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 道路边线
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, 20, canvas.height);
            ctx.fillRect(canvas.width - 20, 0, 20, canvas.height);
            
            // 道路标线
            ctx.fillStyle = '#fff';
            roadLines.forEach(line => {
                ctx.fillRect(line.x, line.y, line.width, line.height);
            });
        }
        
        // 更新道路标线
        function updateRoadLines() {
            roadLines.forEach(line => {
                line.y += speed;
                if (line.y > canvas.height) {
                    line.y = -line.height;
                }
            });
        }
        
        // 碰撞检测
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
        }
        
        // 重新开始
        function restartGame() {
            gameRunning = true;
            score = 0;
            speed = 5;
            enemies = [];
            player.x = canvas.width / 2 - 25;
            document.getElementById('gameOver').style.display = 'none';
            gameLoop();
        }
        
        // 游戏主循环
        function gameLoop() {
            if (!gameRunning) return;
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制道路
            drawRoad();
            
            // 更新道路标线
            updateRoadLines();
            
            // 玩家移动
            if (keys.left && player.x > 20) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < canvas.width - player.width - 20) {
                player.x += player.speed;
            }
            
            // 绘制玩家赛车
            drawCar(player.x, player.y, player.width, player.height, player.color);
            
            // 生成敌方赛车
            if (Math.random() < 0.02) {
                spawnEnemy();
            }
            
            // 更新和绘制敌方赛车
            enemies.forEach((enemy, index) => {
                enemy.y += speed + enemySpeed;
                
                // 绘制敌方赛车
                drawCar(enemy.x, enemy.y, enemy.width, enemy.height, enemy.color);
                
                // 碰撞检测
                if (checkCollision(player, enemy)) {
                    gameOver();
                }
                
                // 移除屏幕外的敌方赛车
                if (enemy.y > canvas.height) {
                    enemies.splice(index, 1);
                    score += 10;
                    document.getElementById('score').textContent = score;
                    
                    // 增加难度
                    if (score % 100 === 0 && speed < 15) {
                        speed += 0.5;
                    }
                }
            });
            
            requestAnimationFrame(gameLoop);
        }
        
        // 开始游戏
        gameLoop();
    </script>
</body>
</html>
